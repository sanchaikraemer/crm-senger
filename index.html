<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CRM — Leads Senger (Kanban)</title>

  <style>
    :root{
      --bg:#f3f7f8;
      --card:#ffffff;
      --text:#0a0a0a;
      --muted:#5b6b7a;
      --line:#dbe5ea;
      --shadow:0 10px 24px rgba(10,10,10,.08);
      --r:16px;

      --teal:#0b9fb2;
      --teal-2:#0aa3b8;
      --teal-soft:#e6f6f7;

      --danger:#ef4444;
      --ok:#16a34a;

      --warn:#f59e0b;
      --pill:#eef2f7;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:var(--bg);
      color:var(--text);
    }

    header{
      position:sticky; top:0; z-index:20;
      background:rgba(246,247,251,.92);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--line);
    }

    .wrap{max-width:1500px;margin:0 auto;padding:14px 14px 10px}
    .top{
      display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between;
      gap:10px;
    }
    .title{
      display:flex; align-items:center; gap:12px;
      min-width:260px;
    }
    h1{font-size:18px;margin:0}
    .statusbar{
      display:flex; align-items:center; gap:10px; flex-wrap:wrap;
      color:var(--muted); font-size:13px;
    }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 10px; border-radius:999px;
      background:#fff; border:1px solid var(--line);
      box-shadow:0 2px 10px rgba(10,10,10,.04);
    }
    .dot{width:10px;height:10px;border-radius:50%;}
    .dot.ok{background:var(--ok)}
    .dot.warn{background:var(--warn)}
    .dot.bad{background:var(--danger)}

    .subline{
      margin-top:8px;
      display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between;
    }

    .filters{
      display:flex; flex-wrap:wrap; gap:10px; align-items:center;
    }
    input[type="search"], select{
      height:40px;
      padding:0 12px;
      border-radius:12px;
      border:1px solid var(--line);
      outline:none;
      background:#fff;
      min-width:220px;
      box-shadow:0 2px 10px rgba(10,10,10,.03);
    }
    select{min-width:170px}
    .btn{
      height:40px;
      padding:0 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      font-weight:600;
    }
    .btn.primary{
      background:var(--teal);
      color:#fff;
      border-color:transparent;
    }
    .btn.ghost{background:#fff}
    .btn.danger{
      background:var(--danger);
      color:#fff;
      border-color:transparent;
    }

    .totals{
      display:flex; flex-wrap:wrap; gap:10px; align-items:center;
    }
    .totalBox{
      background:#fff; border:1px solid var(--line);
      border-radius:999px;
      padding:6px 12px;
      display:flex; gap:8px; align-items:center;
      box-shadow:0 2px 10px rgba(10,10,10,.03);
      font-size:13px;
      color:var(--muted);
    }
    .totalBox b{color:var(--teal)}

    main{max-width:1500px;margin:0 auto;padding:12px 14px 22px}
    .board{
      display:grid;
      grid-template-columns: repeat(5, minmax(260px, 1fr));
      gap:12px;
      overflow:auto;
      padding-bottom:10px;
    }
    .col{
      background:rgba(255,255,255,.55);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:0 6px 16px rgba(10,10,10,.05);
      min-height:300px;
      display:flex;
      flex-direction:column;
    }
    .colHead{
      padding:12px 12px 10px;
      display:flex; align-items:center; justify-content:space-between;
      gap:10px;
      border-bottom:1px solid rgba(219,229,234,.7);
      background:rgba(255,255,255,.8);
      border-top-left-radius:18px; border-top-right-radius:18px;
    }
    .colTitle{
      font-weight:800; letter-spacing:.2px; font-size:13px;
    }
    .colCount{
      min-width:28px;
      height:22px;
      padding:0 8px;
      border-radius:999px;
      background:var(--teal);
      color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-size:12px;
    }
    .cards{
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
      overflow:auto;
      max-height: calc(100vh - 230px);
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:0 10px 22px rgba(10,10,10,.06);
      padding:12px 12px 10px;
      cursor:pointer;
      user-select:none;
    }
    .card.dragging{opacity:.5}
    .cardTop{
      display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
    }
    .cardName{font-weight:800; font-size:14px; line-height:1.2}
    .meta{
      margin-top:6px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      color:var(--muted);
      font-size:12px;
    }
    .tags{display:flex; gap:6px; flex-wrap:wrap}
    .tag{
      padding:4px 8px;
      border-radius:999px;
      background:var(--pill);
      color:#1f2937;
      border:1px solid rgba(219,229,234,.8);
      font-weight:700;
      font-size:12px;
    }
    .tag.date{background:var(--teal-soft); border-color:rgba(11,159,178,.25); color:#0b7280}
    .tag.date.ok{background:#ecfdf5;border-color:rgba(22,163,74,.25);color:#15803d}
    .tag.date.bad{background:#fef2f2;border-color:rgba(239,68,68,.25);color:#b91c1c}
    .prio{
      font-weight:800;
      font-size:12px;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid rgba(219,229,234,.9);
      background:#fff;
      color:#334155;
    }

    /* ======= MODAL (sem precisar rolar até salvar) ======= */
    dialog#dlg{
      width:min(980px, calc(100vw - 24px));
      border:none;
      border-radius:22px;
      box-shadow:0 30px 80px rgba(10,10,10,.35);
      padding:0;
      overflow:hidden;             /* evita scrollbar do dialog */
      max-height:85vh;             /* controla altura */
    }
    dialog::backdrop{background:rgba(15,23,42,.45)}

    .dlgHead{
      padding:16px 18px;
      border-bottom:1px solid var(--line);
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      background:#fff;
    }
    .dlgTitle{font-size:20px;font-weight:900;margin:0}
    .dlgClose{
      height:40px; padding:0 14px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      font-weight:800;
    }

    /* corpo do modal vira flex: conteúdo + ações fixas */
    form#leadForm{
      height:calc(85vh - 74px); /* 74px ~ header do modal */
      display:flex;
      flex-direction:column;
      background:#fff;
    }

    #dlgContent{
      flex:1;
      overflow:hidden; /* IMPORTANT: sem rolagem */
      padding:16px 18px 10px;
    }

    .grid2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px 18px;
      align-items:start;
    }

    .field{display:flex; flex-direction:column; gap:6px}
    .field label{font-size:12px;color:var(--muted);font-weight:700}
    .field input, .field select, .field textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      font-size:14px;
      background:#fff;
      outline:none;
    }
    .field textarea{resize:none}

    /* bloco inferior (obs e motivo) */
    .bottom2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px 18px;
      margin-top:12px;
    }
    /* altura controlada para caber sem scroll */
    #f_observacao{height:92px}
    #f_motivo_perda{height:44px}

    /* linha com 2 campos no lado direito (Empreendimento + Atividade) */
    .row2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
    }

    /* ações sempre visíveis */
    #dlgActions{
      border-top:1px solid var(--line);
      padding:12px 18px;
      display:flex;
      justify-content:flex-end;
      gap:10px;
      background:#fff;
    }

    /* celular: vira 1 coluna e aí pode precisar rolar (mas botões continuam visíveis) */
    @media (max-width: 900px){
      .board{grid-template-columns: repeat(2, minmax(260px, 1fr));}
      #dlgContent{overflow:auto;} /* no celular libera rolagem pra não quebrar */
      form#leadForm{height:calc(92vh - 74px);}
      .grid2, .bottom2{grid-template-columns:1fr}
      .row2{grid-template-columns:1fr}
      #f_observacao{height:110px}
    }
    @media (max-width: 560px){
      .board{grid-template-columns: 1fr;}
      input[type="search"], select{min-width:unset; width:100%}
      .filters{width:100%}
    }
  </style>
</head>

<body>
  <header>
    <div class="wrap">
      <div class="top">
        <div class="title">
          <h1>CRM — Leads Senger</h1>
          <div class="statusbar" id="statusbar">
            <span class="pill"><span class="dot warn" id="dot"></span><span id="statusText">Conectando…</span></span>
            <span class="pill" id="syncText">Sincronizando (Supabase)…</span>
          </div>
        </div>

        <div class="totals">
          <div class="totalBox" title="Leads com etapa = Perdido">
            <span>Leads perdidos</span><b id="lostCount">0</b>
          </div>
          <div class="totalBox">
            <span>Leads totais</span><b id="allCount">0</b>
          </div>
          <button class="btn primary" id="newBtn">+ Novo Lead</button>
        </div>
      </div>

      <div class="subline">
        <div class="filters">
          <input id="q" type="search" placeholder="Buscar nome/telefone…" />
          <select id="fEmp">
            <option value="">Empreendimento</option>
          </select>
          <select id="fOrigem">
            <option value="">Origem</option>
          </select>
          <select id="fResp">
            <option value="">Responsável</option>
          </select>
          <select id="fPrio">
            <option value="">Prioridade</option>
          </select>
        </div>

        <div class="filters">
          <button class="btn ghost" id="toggleLostBtn">Mostrar perdidos</button>
          <button class="btn ghost" id="exportBtn">Exportar CSV</button>
          <button class="btn ghost" id="importBtn">Importar CSV</button>
          <input id="fileInp" type="file" accept=".csv,text/csv" style="display:none" />
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="board" id="board"></div>
  </main>

  <!-- MODAL -->
  <dialog id="dlg">
    <div class="dlgHead">
      <h2 class="dlgTitle" id="dlgTitle">Editar Lead</h2>
      <button class="dlgClose" id="closeDlg" type="button">Fechar</button>
    </div>

    <form id="leadForm" autocomplete="off">
      <div id="dlgContent">
        <!-- AQUI É O LAYOUT QUE VOCÊ PEDIU (ocupando o “vazio” vermelho com Telefone/Responsável e deixando Observação embaixo) -->
        <div class="grid2">
          <!-- COLUNA ESQUERDA -->
          <div>
            <div class="field">
              <label for="f_data_inicio">Data início</label>
              <input id="f_data_inicio" type="date" />
            </div>

            <div class="field" style="margin-top:10px">
              <label for="f_prioridade">Prioridade</label>
              <select id="f_prioridade"></select>
            </div>

            <div class="field" style="margin-top:10px">
              <label for="f_nome">Nome *</label>
              <input id="f_nome" type="text" />
            </div>

            <div class="field" style="margin-top:10px">
              <label for="f_telefone">Telefone</label>
              <input id="f_telefone" type="tel" placeholder="Ex.: 54999013331" />
            </div>

            <div class="field" style="margin-top:10px">
              <label for="f_etapa">Etapa</label>
              <select id="f_etapa"></select>
            </div>

            <div class="field" style="margin-top:10px">
              <label for="f_resultado">Resultado</label>
              <select id="f_resultado"></select>
            </div>

            <div class="field" style="margin-top:10px">
              <label for="f_responsavel">Responsável</label>
              <select id="f_responsavel"></select>
            </div>
          </div>

          <!-- COLUNA DIREITA -->
          <div>
            <div class="field">
              <label for="f_proximo_contato">Próximo contato</label>
              <input id="f_proximo_contato" type="date" />
            </div>

            <div class="field" style="margin-top:10px">
              <label>Empreendimento / Atividade</label>
              <div class="row2">
                <select id="f_empreendimento"></select>
                <select id="f_atividade"></select>
              </div>
            </div>

            <div class="field" style="margin-top:10px">
              <label for="f_origem">Origem</label>
              <select id="f_origem"></select>
            </div>

            <div class="field" style="margin-top:10px">
              <label for="f_motivo_perda">Motivo de perda</label>
              <select id="f_motivo_perda"></select>
            </div>
          </div>
        </div>

        <!-- Observação fica embaixo, onde sempre esteve -->
        <div class="bottom2">
          <div class="field">
            <label for="f_observacao">Observação</label>
            <textarea id="f_observacao"></textarea>
          </div>
          <div></div>
        </div>
      </div>

      <div id="dlgActions">
        <button class="btn danger" id="delBtn" type="button">Excluir</button>
        <button class="btn" id="cancelBtn" type="button">Cancelar</button>
        <button class="btn primary" id="saveBtn" type="submit">Salvar</button>
      </div>
    </form>
  </dialog>

  <script>
    /***************
     * CONFIG SUPABASE
     * 1) Cole aqui suas credenciais (as mesmas que você já usa)
     ***************/
    const SUPABASE_URL = "COLE_AQUI_SUA_SUPABASE_URL";      // ex: https://xxxx.supabase.co
    const SUPABASE_ANON_KEY = "COLE_AQUI_SUA_ANON_KEY";
    const TABLE = "leads"; // public.leads

    /***************
     * LISTAS (AJUSTE SE QUISER)
     ***************/
    const LISTS = {
      etapa: ["Novo","Em atendimento","Evoluindo","Negociação","Stand by","Perdido"],
      prioridade: ["Baixa","Média","Alta"],
      atividade: ["WhatsApp","Ligação","Visita","E-mail"],
      resultado: ["Conversando","Aguardando","Conseguiu falar","Não atende","Sem interesse"],
      origem: ["Instagram","Meta","Indicação","Site","Outros"],
      empreendimento: ["Quality","Prime","Personalité","Premium Office","Evolutti","Renaissance","Outros"],
      responsavel: ["Sanchai","Equipe","Imobiliária","Outro"],
      motivo_perda: ["","Sem resposta","Sem entrada","Mudou planos","Comprou outro","Valor alto","Outros"]
    };

    /***************
     * STATE
     ***************/
    const COLS = [
      {key:"Novo", title:"NOVO"},
      {key:"Em atendimento", title:"EM ATENDIMENTO"},
      {key:"Evoluindo", title:"EVOLUINDO"},
      {key:"Negociação", title:"NEGOCIAÇÃO"},
      {key:"Stand by", title:"STAND BY"},
    ];
    let ALL = [];
    let showLost = false;
    let editingId = null;

    /***************
     * HELPERS
     ***************/
    const $ = (id)=>document.getElementById(id);

    function todayISO(){
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const dd = String(d.getDate()).padStart(2,"0");
      return `${yyyy}-${mm}-${dd}`;
    }
    function nowISO(){ return new Date().toISOString(); }

    function setStatus(kind, text){
      $("statusText").textContent = text;
      const dot = $("dot");
      dot.className = "dot " + (kind==="ok"?"ok":kind==="bad"?"bad":"warn");
    }

    function buildSelect(sel, arr, placeholder=null){
      sel.innerHTML = "";
      if(placeholder!==null){
        const o=document.createElement("option");
        o.value=""; o.textContent=placeholder;
        sel.appendChild(o);
      }
      for(const v of arr){
        const o=document.createElement("option");
        o.value=v; o.textContent=v;
        sel.appendChild(o);
      }
    }

    function daysBetween(aISO){
      if(!aISO) return null;
      const a = new Date(aISO+"T00:00:00");
      const b = new Date();
      const ms = a.getTime() - new Date(b.getFullYear(), b.getMonth(), b.getDate()).getTime();
      return Math.round(ms / 86400000);
    }

    function dateBadgeClass(nextISO){
      if(!nextISO) return "";
      const d = daysBetween(nextISO);
      if(d===null) return "";
      if(d < 0) return "bad";
      if(d <= 2) return "ok";
      return "";
    }

    /***************
     * SUPABASE REST
     ***************/
    async function sbFetch(path, opts={}){
      if(!SUPABASE_URL || !SUPABASE_ANON_KEY || SUPABASE_URL.includes("COLE_AQUI")){
        throw new Error("Supabase não configurado (URL/KEY).");
      }
      const url = SUPABASE_URL.replace(/\/$/,"") + path;
      const headers = Object.assign({
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
        "Content-Type": "application/json",
        "Accept": "application/json"
      }, opts.headers||{});
      const res = await fetch(url, {...opts, headers});
      const txt = await res.text();
      let json = null;
      try{ json = txt ? JSON.parse(txt) : null; }catch(e){}
      if(!res.ok){
        const msg = (json && (json.message||json.error||json.details)) ? (json.message||json.error||json.details) : txt;
        const err = new Error(msg || ("HTTP "+res.status));
        err.status = res.status;
        err.raw = json || txt;
        throw err;
      }
      return json;
    }

    async function loadAll(){
      // pega tudo ordenado por etapa, empreendimento, ordem
      const data = await sbFetch(`/rest/v1/${TABLE}?select=*&order=etapa.asc,empreendimento.asc,ordem.desc,criado_em.desc`, {
        method:"GET"
      });
      return Array.isArray(data) ? data : [];
    }

    async function insertLead(payload){
      // POST retorna linhas se prefer=representation
      const data = await sbFetch(`/rest/v1/${TABLE}`,{
        method:"POST",
        headers: {"Prefer":"return=representation"},
        body: JSON.stringify(payload)
      });
      return data?.[0] || null;
    }

    async function patchLead(id, payload){
      const data = await sbFetch(`/rest/v1/${TABLE}?id=eq.${encodeURIComponent(id)}`,{
        method:"PATCH",
        headers: {"Prefer":"return=representation"},
        body: JSON.stringify(payload)
      });
      return data?.[0] || null;
    }

    async function deleteLead(id){
      await sbFetch(`/rest/v1/${TABLE}?id=eq.${encodeURIComponent(id)}`, {method:"DELETE"});
      return true;
    }

    /***************
     * RENDER BOARD
     ***************/
    function applyFilters(list){
      const q = $("q").value.trim().toLowerCase();
      const emp = $("fEmp").value;
      const ori = $("fOrigem").value;
      const resp = $("fResp").value;
      const prio = $("fPrio").value;

      return list.filter(x=>{
        if(!showLost && x.etapa==="Perdido") return false;
        if(q){
          const s = `${x.nome||""} ${x.telefone||""}`.toLowerCase();
          if(!s.includes(q)) return false;
        }
        if(emp && (x.empreendimento||"")!==emp) return false;
        if(ori && (x.origem||"")!==ori) return false;
        if(resp && (x.responsavel||"")!==resp) return false;
        if(prio && (x.prioridade||"")!==prio) return false;
        return true;
      });
    }

    function sortStandByGrouped(arr){
      // agrupa por empreendimento e mantém ordem desc dentro
      return [...arr].sort((a,b)=>{
        const ea = (a.empreendimento||"").toLowerCase();
        const eb = (b.empreendimento||"").toLowerCase();
        if(ea<eb) return -1;
        if(ea>eb) return 1;
        const oa = Number(a.ordem||0);
        const ob = Number(b.ordem||0);
        return ob - oa;
      });
    }

    function render(){
      const list = applyFilters(ALL);

      const lost = ALL.filter(x=>x.etapa==="Perdido").length;
      $("lostCount").textContent = String(lost);
      $("allCount").textContent = String(ALL.length);
      $("toggleLostBtn").textContent = showLost ? "Ocultar perdidos" : "Mostrar perdidos";

      $("board").innerHTML = "";
      for(const col of COLS){
        const box = document.createElement("div");
        box.className = "col";
        box.dataset.etapa = col.key;

        const head = document.createElement("div");
        head.className = "colHead";
        const t = document.createElement("div");
        t.className = "colTitle";
        t.textContent = col.title;

        const inCol = list.filter(x=>x.etapa===col.key);
        const count = document.createElement("div");
        count.className = "colCount";
        count.textContent = String(inCol.length);

        head.appendChild(t);
        head.appendChild(count);

        const cards = document.createElement("div");
        cards.className = "cards";
        cards.addEventListener("dragover", (e)=>{e.preventDefault();});
        cards.addEventListener("drop", (e)=>onDrop(e, col.key));

        const items = (col.key==="Stand by") ? sortStandByGrouped(inCol) : [...inCol].sort((a,b)=>Number(b.ordem||0)-Number(a.ordem||0));

        for(const lead of items){
          cards.appendChild(renderCard(lead));
        }

        box.appendChild(head);
        box.appendChild(cards);
        $("board").appendChild(box);
      }
    }

    function renderCard(lead){
      const c = document.createElement("div");
      c.className = "card";
      c.draggable = true;
      c.dataset.id = lead.id;

      c.addEventListener("click", ()=>openEdit(lead.id));
      c.addEventListener("dragstart", (e)=>{
        c.classList.add("dragging");
        e.dataTransfer.setData("text/plain", lead.id);
      });
      c.addEventListener("dragend", ()=>c.classList.remove("dragging"));

      const top = document.createElement("div");
      top.className = "cardTop";

      const left = document.createElement("div");
      const name = document.createElement("div");
      name.className = "cardName";
      name.textContent = lead.nome || "(Sem nome)";
      left.appendChild(name);

      const pr = document.createElement("div");
      pr.className = "prio";
      pr.textContent = lead.prioridade || "—";

      top.appendChild(left);
      top.appendChild(pr);

      const meta = document.createElement("div");
      meta.className = "meta";

      const emp = document.createElement("div");
      emp.textContent = lead.empreendimento || "—";

      const tags = document.createElement("div");
      tags.className = "tags";
      if(lead.proximo_contato){
        const tg = document.createElement("span");
        tg.className = "tag date " + dateBadgeClass(lead.proximo_contato);
        const d = daysBetween(lead.proximo_contato);
        tg.textContent = (d===0) ? "hoje" : (d===1) ? "1 dia" : (d===-1) ? "ontem" : `${Math.abs(d)} ${Math.abs(d)===1?"dia":"dias"}`;
        tags.appendChild(tg);
      }

      meta.appendChild(emp);
      meta.appendChild(tags);

      c.appendChild(top);
      c.appendChild(meta);
      return c;
    }

    /***************
     * DRAG & DROP: ao mover, vai para o topo da coluna destino
     ***************/
    async function onDrop(e, newEtapa){
      e.preventDefault();
      const id = e.dataTransfer.getData("text/plain");
      if(!id) return;
      try{
        const lead = ALL.find(x=>x.id===id);
        if(!lead) return;

        // topo = ordem alta
        const topOrder = Date.now();

        const updated = await patchLead(id, {
          etapa: newEtapa,
          ordem: topOrder,
          atualizado_em: nowISO()
        });
        if(updated){
          const idx = ALL.findIndex(x=>x.id===id);
          ALL[idx] = updated;
          render();
        }
      }catch(err){
        console.error(err);
        alert("Erro ao mover lead. Verifique RLS/políticas e campos no Supabase.");
      }
    }

    /***************
     * MODAL
     ***************/
    function fillFormSelects(){
      buildSelect($("f_prioridade"), LISTS.prioridade, null);
      buildSelect($("f_etapa"), LISTS.etapa, null);
      buildSelect($("f_resultado"), LISTS.resultado, null);
      buildSelect($("f_origem"), LISTS.origem, null);
      buildSelect($("f_empreendimento"), LISTS.empreendimento, null);
      buildSelect($("f_atividade"), LISTS.atividade, null);
      buildSelect($("f_responsavel"), LISTS.responsavel, null);
      buildSelect($("f_motivo_perda"), LISTS.motivo_perda, null);
    }

    function openNew(){
      editingId = null;
      $("dlgTitle").textContent = "Novo Lead";
      $("delBtn").style.display = "none";

      $("f_data_inicio").value = todayISO();
      $("f_proximo_contato").value = "";
      $("f_prioridade").value = "Baixa";
      $("f_nome").value = "";
      $("f_telefone").value = "";
      $("f_etapa").value = "Novo";
      $("f_resultado").value = "Conversando";
      $("f_responsavel").value = "Sanchai";
      $("f_empreendimento").value = "Quality";
      $("f_atividade").value = "WhatsApp";
      $("f_origem").value = "Instagram";
      $("f_motivo_perda").value = "";
      $("f_observacao").value = "";

      $("dlg").showModal();
    }

    function openEdit(id){
      const d = ALL.find(x=>x.id===id);
      if(!d) return;
      editingId = id;
      $("dlgTitle").textContent = "Editar Lead";
      $("delBtn").style.display = "inline-flex";

      $("f_data_inicio").value = (d.data_inicio || "").slice(0,10);
      $("f_proximo_contato").value = (d.proximo_contato || "").slice(0,10);
      $("f_prioridade").value = d.prioridade || "Baixa";
      $("f_nome").value = d.nome || "";
      $("f_telefone").value = d.telefone || "";
      $("f_etapa").value = d.etapa || "Novo";
      $("f_resultado").value = d.resultado || "Conversando";
      $("f_responsavel").value = d.responsavel || "Sanchai";
      $("f_empreendimento").value = d.empreendimento || "Quality";
      $("f_atividade").value = d.atividade || "WhatsApp";
      $("f_origem").value = d.origem || "Instagram";
      $("f_motivo_perda").value = d.motivo_perda || "";
      $("f_observacao").value = d.observacao || "";

      $("dlg").showModal();
    }

    function closeDlg(){
      $("dlg").close();
    }

    function formPayload(){
      const payload = {
        data_inicio: $("f_data_inicio").value || null,
        proximo_contato: $("f_proximo_contato").value || null,
        prioridade: $("f_prioridade").value || null,
        nome: ($("f_nome").value || "").trim(),
        telefone: ($("f_telefone").value || "").trim() || null,
        etapa: $("f_etapa").value || "Novo",
        resultado: $("f_resultado").value || null,
        responsavel: $("f_responsavel").value || null,
        empreendimento: $("f_empreendimento").value || null,
        atividade: $("f_atividade").value || null,
        origem: $("f_origem").value || null,
        motivo_perda: $("f_motivo_perda").value || null,
        observacao: ($("f_observacao").value || "").trim() || null,
        atualizado_em: nowISO()
      };

      // IMPORTANTÍSSIMO: evita o erro do console "invalid input syntax for type date: \"\""
      if(payload.proximo_contato === "") payload.proximo_contato = null;
      if(payload.proximo_contato === undefined) payload.proximo_contato = null;

      if(!payload.nome){
        alert("Nome é obrigatório.");
        return null;
      }
      // se não é Perdido, limpa motivo_perda
      if(payload.etapa !== "Perdido") payload.motivo_perda = null;
      // se é Perdido, exige motivo_perda
      if(payload.etapa === "Perdido" && !payload.motivo_perda){
        alert("Motivo de perda é obrigatório quando Etapa = Perdido.");
        return null;
      }
      return payload;
    }

    $("leadForm").addEventListener("submit", async (e)=>{
      e.preventDefault();
      try{
        const payload = formPayload();
        if(!payload) return;

        if(editingId){
          // mantém ordem atual
          const cur = ALL.find(x=>x.id===editingId);
          const updated = await patchLead(editingId, {
            ...payload,
            ordem: cur?.ordem ?? Date.now()
          });
          if(updated){
            const idx = ALL.findIndex(x=>x.id===editingId);
            ALL[idx] = updated;
          }
        }else{
          const created = await insertLead({
            ...payload,
            criado_em: nowISO(),
            ordem: Date.now()
          });
          if(created) ALL.unshift(created);
        }

        closeDlg();
        render();
      }catch(err){
        console.error(err);
        alert("Erro ao salvar no Supabase. Provável: política/RLS, tabela, ou campo com tipo errado.");
      }
    });

    $("delBtn").addEventListener("click", async ()=>{
      if(!editingId) return;
      if(!confirm("Excluir este lead?")) return;
      try{
        await deleteLead(editingId);
        ALL = ALL.filter(x=>x.id!==editingId);
        closeDlg();
        render();
      }catch(err){
        console.error(err);
        alert("Erro ao excluir. Verifique RLS/políticas.");
      }
    });

    /***************
     * CSV
     ***************/
    function exportCSV(){
      const rows = [["id","data_inicio","proximo_contato","prioridade","nome","telefone","empreendimento","etapa","atividade","resultado","origem","responsavel","motivo_perda","observacao","criado_em","atualizado_em","ordem"]];
      for(const x of ALL){
        rows.push([
          x.id||"", x.data_inicio||"", x.proximo_contato||"", x.prioridade||"", x.nome||"", x.telefone||"",
          x.empreendimento||"", x.etapa||"", x.atividade||"", x.resultado||"", x.origem||"", x.responsavel||"",
          x.motivo_perda||"", (x.observacao||"").replace(/\n/g," "), x.criado_em||"", x.atualizado_em||"", x.ordem||""
        ]);
      }
      const csv = rows.map(r=>r.map(v=>{
        const s = String(v ?? "");
        return /[",\n;]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
      }).join(",")).join("\n");

      const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `leads_${todayISO()}.csv`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    async function importCSVFile(file){
      const text = await file.text();
      const lines = text.split(/\r?\n/).filter(Boolean);
      if(lines.length < 2){ alert("CSV vazio."); return; }
      const header = lines[0].split(",").map(s=>s.trim());
      const idx = (k)=>header.indexOf(k);

      // importa apenas nome/telefone/empreendimento/origem (simples)
      let ok=0, fail=0;
      for(let i=1;i<lines.length;i++){
        const cols = parseCSVLine(lines[i], header.length);
        if(!cols) continue;
        const nome = (cols[idx("nome")]||"").trim();
        if(!nome){ fail++; continue; }
        const payload = {
          data_inicio: todayISO(),
          proximo_contato: null,
          prioridade: "Baixa",
          nome,
          telefone: (cols[idx("telefone")]||"").trim() || null,
          empreendimento: (cols[idx("empreendimento")]||"").trim() || "Outros",
          etapa: "Novo",
          atividade: "WhatsApp",
          resultado: "Conversando",
          origem: (cols[idx("origem")]||"").trim() || "Outros",
          responsavel: "Sanchai",
          motivo_perda: null,
          observacao: null,
          criado_em: nowISO(),
          atualizado_em: nowISO(),
          ordem: Date.now() + i
        };
        try{
          const created = await insertLead(payload);
          if(created){ ALL.unshift(created); ok++; }
        }catch(e){
          console.error(e);
          fail++;
        }
      }
      render();
      alert(`Importação concluída.\nOK: ${ok}\nFalhas: ${fail}`);
    }

    function parseCSVLine(line, expected){
      // parser simples (respeita aspas)
      const out=[];
      let cur="", inQ=false;
      for(let i=0;i<line.length;i++){
        const ch=line[i];
        if(ch === '"' ){
          if(inQ && line[i+1]==='"'){ cur+='"'; i++; }
          else inQ = !inQ;
        } else if(ch === ',' && !inQ){
          out.push(cur); cur="";
        } else cur+=ch;
      }
      out.push(cur);
      while(out.length < expected) out.push("");
      return out;
    }

    /***************
     * INIT
     ***************/
    function initFilters(){
      buildSelect($("fEmp"), LISTS.empreendimento, "Empreendimento");
      buildSelect($("fOrigem"), LISTS.origem, "Origem");
      buildSelect($("fResp"), LISTS.responsavel, "Responsável");
      buildSelect($("fPrio"), LISTS.prioridade, "Prioridade");

      for(const id of ["q","fEmp","fOrigem","fResp","fPrio"]){
        $(id).addEventListener("input", render);
        $(id).addEventListener("change", render);
      }
    }

    async function boot(){
      fillFormSelects();
      initFilters();

      $("newBtn").addEventListener("click", openNew);
      $("closeDlg").addEventListener("click", closeDlg);
      $("cancelBtn").addEventListener("click", closeDlg);

      $("toggleLostBtn").addEventListener("click", ()=>{
        showLost = !showLost;
        render();
      });

      $("exportBtn").addEventListener("click", exportCSV);
      $("importBtn").addEventListener("click", ()=>$("fileInp").click());
      $("fileInp").addEventListener("change", async ()=>{
        const f = $("fileInp").files?.[0];
        if(!f) return;
        await importCSVFile(f);
        $("fileInp").value="";
      });

      try{
        setStatus("warn","Carregando…");
        ALL = await loadAll();
        setStatus("ok","Online • Sincronizado");
        $("syncText").textContent = "Sincronizado (Supabase).";
        render();
      }catch(err){
        console.error(err);
        setStatus("bad","Offline (Supabase)");
        $("syncText").textContent = "Não conectou (Supabase).";
        alert("Não conseguiu salvar no Supabase.\nProvável: URL/KEY, RLS/política, tabela, ou coluna faltando.");
        render();
      }
    }

    boot();
  </script>
