<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CRM — Leads Senger (Kanban)</title>
  <style>
    :root{
      --bg:#f3f7f8;
      --card:#ffffff;
      --text:#0a0a0a;
      --muted:#5b6b7a;
      --line:#dbe5ea;
      --shadow:0 10px 24px rgba(10,10,10,.08);
      --r:16px;

      --teal:#0b9fb2;
      --teal-2:#0aa3b8;
      --teal-soft:#e6f6f7;
      --danger:#ef4444;
      --ok:#16a34a;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:var(--bg);
      color:var(--text);
    }

    header{
      position:sticky; top:0; z-index:20;
      background:rgba(246,247,251,.92);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--line);
    }

    .wrap{max-width:1500px;margin:0 auto;padding:7px 16px}
    .top{
      display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
    }
    .title{display:flex; flex-direction:column; gap:2px}

    .titleRow{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      width:100%;
    }
    .subtitleInline{
      margin-left:auto;
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width: 900px;
    }

    .title h1{font-size:16px;margin:0}
    .actions{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .btn{
      border:1px solid var(--line);
      background:var(--card);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      font-weight:800;
      box-shadow: 0 2px 8px rgba(10,10,10,.04);
      color:var(--text);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .btn.primary{background:var(--teal); color:#fff; border-color:transparent}
    .btn.danger{background:var(--danger); color:#fff; border-color:transparent}

    .input, select{
      border:1px solid var(--line);
      background:#fff;
      padding:10px 12px;
      border-radius:12px;
      outline:none;
      min-width:160px;
      color:var(--text);
    }

    .searchWrap{ position:relative; display:inline-flex; align-items:center; }
    .searchWrap .input{ padding-right:38px; }
    .clearBtn{
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      border:0;
      background:transparent;
      cursor:pointer;
      font-size:18px;
      line-height:1;
      color:var(--muted);
      width:26px;
      height:26px;
      border-radius:999px;
      display:none;
      align-items:center;
      justify-content:center;
    }
    .clearBtn:hover{ background:rgba(0,0,0,.05); }
    .clearBtn.show{ display:inline-flex; }

    .hint{font-size:12px;color:var(--muted); margin-top:5px}

    main .wrap{
      padding-top:16px;
      height: calc(100vh - 132px);
    }

    .board{
      display:grid;
      grid-auto-flow:column;
      grid-auto-columns:minmax(220px, 0.72fr);
      gap:14px;
      overflow:auto;
      height:100%;
      padding-bottom:14px;
    }
    .col{
      background:rgba(255,255,255,.6);
      border:1px solid var(--line);
      border-radius:var(--r);
      box-shadow: 0 2px 12px rgba(10,10,10,.04);
      min-height:280px;
      display:flex; flex-direction:column;
      height:100%;
    }
    .colHead{
      padding:12px 12px 10px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid var(--line);
      gap:10px;
    }
    .colHead .name{font-weight:950;font-size:12px; letter-spacing:.2px}
    .colHead .count{
      font-size:11px;
      font-weight:900;
      color:#fff;
      background:var(--teal);
      padding:4px 7px;
      border-radius:999px;
      white-space:nowrap;
      border:none;
    }

    .dropzone{
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
      overflow-y:auto;
    }
    .dropzone.dragover{
      outline:2px dashed rgba(11,159,178,.35);
      outline-offset:-6px;
      border-radius:14px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px 10px;
      box-shadow: var(--shadow);
      cursor:grab;
      user-select:none;
      position:relative;
    }
    .card:active{cursor:grabbing}

    .card.high-priority{
      background:#fff8cc;
      border:1px solid #e5d18c;
    }

    .row1{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
    .nm{font-weight:950;font-size:13px;line-height:1.2}

    .prioText{
      font-size:12px;
      color:var(--muted);
      font-weight:650;
      white-space:nowrap;
    }

    .sub-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      font-size:12px;
      color:var(--muted);
      margin-top:6px;
    }

    .leftGroup{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
      flex:1;
    }
    .leftGroup .emp{
      font-weight:650;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
    }

    .nc{
      padding:5px 10px;
      border-radius:999px;
      white-space:nowrap;
      font-weight:800;
      border:1px solid transparent;
      font-size:12px;
      line-height:1;
      flex:0 0 auto;
    }
    .nc-neutral{ background:#eef1f4; color:#475569; }
    .nc-green{ background:#16a34a; color:#ffffff; }
    .nc-red{ background:#ef4444; color:#ffffff; }

    .sub-row .dt{
      padding:4px 10px;
      border-radius:999px;
      white-space:nowrap;
      font-weight:700;
      border:1px solid transparent;
      flex:0 0 auto;
    }

    .dt-neutral{ background:#ffffff; color:#475569; border:1px solid var(--line); } /* 0-2 dias / agendado */
    .dt-blue{ background:#0b9fb2; color:#ffffff; } /* 3-4 dias */
    .dt-yellow{ background:#facc15; color:#111111; } /* 5-6 dias */
    .dt-red{ background:#ef4444; color:#ffffff; } /* 7+ dias */

    .standbyLine{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
    }
    .standbyLine .nm{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
    }
    .standbyLine .sep{ opacity:.5; flex:0 0 auto; }
    .standbyLine .empInline{
      font-weight:700;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
      flex:1;
    }

    dialog{
      border:0;
      border-radius:16px;
      box-shadow: 0 20px 60px rgba(10,10,10,.20);
      width:min(860px, 92vw);
      max-height: 88vh;
      padding:0;
    }
    dialog::backdrop{background:rgba(10,10,10,.45)}

    .modal{
      display:flex;
      flex-direction:column;
      height: 88vh;
      max-height: 88vh;
    }

    .modalHead{
      padding:12px 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      border-bottom:1px solid var(--line);
      background:#fff;
      position:sticky;
      top:0;
      z-index:2;
    }
    .modalHead .t{font-weight:980}

    .modalBody{
      padding:12px 14px;
      overflow:auto;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:8px 12px;
    }
    .grid .full{grid-column:1/-1}

    .lbl{
      font-size:12px;
      color:var(--muted);
      margin:0 0 4px 2px;
    }

    textarea{
      width:100%;
      min-height:64px;
      resize:vertical;
    }

    .modalFoot{
      padding:10px 14px;
      display:flex;
      justify-content:flex-end;
      gap:10px;
      flex-wrap:wrap;
      border-top:1px solid var(--line);
      background:#fff;
      position:sticky;
      bottom:0;
      z-index:2;
    }

    .toast{
      position:fixed; left:50%; bottom:16px; transform:translateX(-50%);
      background:#111827; color:#fff;
      padding:10px 12px;
      border-radius:12px;
      font-size:12px;
      box-shadow: 0 12px 34px rgba(0,0,0,.25);
      opacity:0; pointer-events:none;
      transition:.18s ease;
      z-index:50;
    }
    .toast.show{opacity:1}

    .totalBox{
      margin-left:0;
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:14px;
      background:#fff;
      border:1px solid var(--line);
      box-shadow: 0 2px 8px rgba(10,10,10,.04);
      white-space:nowrap;
    }
    .totalBox .t{font-size:12px;color:var(--muted);font-weight:850}
    .totalBox .n{font-size:18px;font-weight:980;color:var(--teal);line-height:1}

    .pill{
      display:inline-flex; align-items:center; gap:6px;
      padding:6px 10px; border-radius:999px;
      background:#fff; border:1px solid var(--line);
      white-space:nowrap;
      font-weight:800;
      color:var(--muted);
      box-shadow: 0 2px 8px rgba(10,10,10,.04);
    }
    .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block}
    .dot.ok{background:#12d16c}
    .dot.warn{background:#ffd400}
    .dot.bad{background:#ef4444}

    @media(max-width:820px){
      header{ position:static; }
      .wrap{ padding:8px 12px; }

      .titleRow{
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap:10px;
        align-items:center;
        width:100%;
      }

      .title h1{
        grid-column:1 / -1;
        font-size:16px;
        margin:0;
      }

      .subtitleInline{ display:none; }

      .statusbar{ grid-column:1 / -1; }

      .totalBox{
        width:100%;
        justify-content:space-between;
        padding:9px 10px;
        grid-column:1 / -1;
      }

      .actions{
        width:100%;
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap:10px;
        margin-top:10px;
      }

      .searchWrap{ grid-column:1 / -1; width:100%; }
      #q{ width:100%; min-width:0; }

      #fEmp, #fOrig, #fResp, #fPri{ width:100%; min-width:0; }

      .btn{ padding:11px 12px; border-radius:14px; width:100%; }

      #new{
        grid-column:1 / -1;
        font-size:15px;
        padding:12px 14px;
      }

      main .wrap{
        padding-top:10px;
        height:auto;
        min-height: calc(100vh - 10px);
      }

      .board{
        grid-auto-columns:minmax(240px, 0.90fr);
        height:auto;
        min-height: calc(100vh - 10px);
      }

      dialog{
        width: 96vw;
        max-height: 92vh;
      }
      .modal{
        height: 92vh;
        max-height: 92vh;
      }
      .grid{
        grid-template-columns: 1fr;
        gap:8px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="top">
      <div class="title">
        <div class="titleRow">
          <h1>CRM — Leads Senger</h1>

          <div class="statusbar" id="statusbar">
            <span class="pill"><span class="dot warn"></span>Conectando…</span>
          </div>

          <div class="subtitleInline">Kanban arrastável + formulário com listas. <b>Sincronizado</b> (Supabase).</div>

          <div class="totalBox" id="totalBox">
            <span class="t">Leads ativos</span>
            <span class="n">0</span>
          </div>

          <div class="totalBox" id="lostBox" title="Clique em 'Mostrar perdidos' para visualizar">
            <span class="t">Leads perdidos</span>
            <span class="n">0</span>
          </div>

          <div class="totalBox" id="allBox">
            <span class="t">Leads totais</span>
            <span class="n">0</span>
          </div>

          <button class="btn primary" id="new" type="button">+ Novo Lead</button>
        </div>
      </div>

      <div class="actions">
        <div class="searchWrap">
          <input id="q" class="input" placeholder="Buscar nome/telefone..." />
          <button class="clearBtn" id="clearQ" type="button" aria-label="Limpar busca">×</button>
        </div>

        <select id="fEmp"></select>
        <select id="fOrig"></select>
        <select id="fResp"></select>
        <select id="fPri"></select>

        <button class="btn" id="toggleLost" type="button">Mostrar perdidos</button>

        <button class="btn" id="exportCsv" type="button">Exportar CSV</button>
        <button class="btn" id="importCsv" type="button">Importar CSV</button>
      </div>
    </div>

    <div class="hint"></div>
  </div>
</header>

<main>
  <div class="wrap" id="mainWrap">
    <div id="board" class="board"></div>
  </div>
</main>

<div class="toast" id="toast">Salvo.</div>

<dialog id="dlg">
  <form class="modal" id="form">
    <div class="modalHead">
      <div class="t" id="dlgTitle">Novo Lead</div>
      <button class="btn" type="button" id="closeDlg">Fechar</button>
    </div>

    <div class="modalBody">
      <div class="grid">
        <div>
          <p class="lbl">Data início</p>
          <input class="input" name="data_inicio" type="date" />
        </div>

        <div>
          <p class="lbl">Próximo contato</p>
          <input class="input" name="proximo_contato" type="date" />
        </div>

        <div>
          <p class="lbl">Prioridade</p>
          <select class="input" name="prioridade"></select>
        </div>

        <div class="full">
          <p class="lbl">Nome *</p>
          <input class="input" name="nome" placeholder="Ex.: João Silva" required />
        </div>

        <div>
          <p class="lbl">Telefone</p>
          <input class="input" name="telefone" placeholder="Ex.: 54999013331" />
        </div>

        <div>
          <p class="lbl">Empreendimento</p>
          <select class="input" name="empreendimento"></select>
        </div>

        <div>
          <p class="lbl">Etapa</p>
          <select class="input" name="etapa"></select>
        </div>

        <div>
          <p class="lbl">Origem</p>
          <select class="input" name="origem"></select>
        </div>

        <div>
          <p class="lbl">Responsável</p>
          <select class="input" name="responsavel"></select>
        </div>

        <div>
          <p class="lbl">Motivo de perda</p>
          <select class="input" name="motivo_perda"></select>
        </div>

        <div class="full">
          <p class="lbl">Observação</p>
          <textarea class="input" name="observacao" placeholder="Notas rápidas..."></textarea>
        </div>
      </div>
    </div>

    <div class="modalFoot">
      <button class="btn danger" id="deleteBtn" type="button" style="display:none;">Excluir</button>
      <button class="btn" type="button" id="cancelBtn">Cancelar</button>
      <button class="btn primary" id="save" type="submit">Salvar</button>
    </div>
  </form>
</dialog>

<input id="file" type="file" accept=".csv" style="display:none;" />

<script>
const SUPABASE_URL = "https://lnrbpiklzymblpyrobwx.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_KXVbF3c7RGFXVTtfYmrzzg_dMK04Q9q";
const TABLE = "leads";

const SHOW_WA_ON_CARD = false;

const LISTS = {
  empreendimento: ["Personalité","Quality","Prime","Evolutti","Boulevard","Premium Office","Renaissance","NVR I–II","NVR III","Outros"],
  etapa: ["Novo","Em atendimento","Evoluindo","Negociação","Stand by","Perdido"],
  prioridade: ["Alta","Média","Baixa"],
  origem: ["Meta","Instagram","Indicação","Corretor","Site","WhatsApp","Ligação","Presencial"],
  responsavel: ["Sanchai","Miguel","Cristian","Corretor"],
  motivo_perda: ["Preço","Parcelamento","Permuta inviável","Vai aguardar","Sem recurso","Nunca respondeu","Lead espírita","Outro"]
};

const ETAPA_ALIASES = {
  "Contato feito": "Em atendimento",
  "Visitou": "Evoluindo",
  "Agendou visita": "Evoluindo",
  "Proposta": "Negociação",
  "Fechado": "Stand by"
};

const MOTIVO_PERDA_ALIASES = {
  "Localização": "Permuta inviável",
  "Financiamento": "Parcelamento",
  "Escolheu outro": "Vai aguardar",
  "Sumiu": "Sem recurso"
};

function normalizeEtapa(etapa){
  const e = (etapa || "").trim();
  if(LISTS.etapa.includes(e)) return e;
  if(ETAPA_ALIASES[e]) return ETAPA_ALIASES[e];
  return "Em atendimento";
}

function normalizeMotivoPerda(m){
  const v = (m || "").trim();
  if(LISTS.motivo_perda.includes(v)) return v;
  if(MOTIVO_PERDA_ALIASES[v]) return MOTIVO_PERDA_ALIASES[v];
  return v || "";
}

const elBoard = document.querySelector("#board");
const q = document.querySelector("#q");
const clearQ = document.querySelector("#clearQ");
const fEmp = document.querySelector("#fEmp");
const fOrig = document.querySelector("#fOrig");
const fResp = document.querySelector("#fResp");
const fPri = document.querySelector("#fPri");
const dlg = document.querySelector("#dlg");
const form = document.querySelector("#form");
const dlgTitle = document.querySelector("#dlgTitle");
const deleteBtn = document.querySelector("#deleteBtn");
const toast = document.querySelector("#toast");
const fileInput = document.querySelector("#file");
const statusbar = document.querySelector("#statusbar");
const totalBox = document.querySelector("#totalBox");
const lostBox = document.querySelector("#lostBox");
const allBox = document.querySelector("#allBox");
const mainWrap = document.querySelector("#mainWrap");
const headerEl = document.querySelector("header");
const toggleLostBtn = document.querySelector("#toggleLost");
const closeDlgBtn = document.querySelector("#closeDlg");
const cancelBtn = document.querySelector("#cancelBtn");

let ALL = [];
let editingId = null;
let originalSnapshot = null;
let SHOW_LOST = false;
let isDragging = false;

function setStatus(type, msg){
  const dotClass = type === "ok" ? "ok" : type === "bad" ? "bad" : "warn";
  statusbar.innerHTML = `<span class="pill"><span class="dot ${dotClass}"></span>${msg}</span>`;
}

function showToast(msg="Salvo."){
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"), 1200);
}

function todayISO(){
  const d = new Date();
  const tz = d.getTimezoneOffset() * 60000;
  return new Date(d - tz).toISOString().slice(0,10);
}
function nowISO(){ return new Date().toISOString(); }
function dayStartLocal(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }

function parseISODateLocal(iso){
  if(!iso) return null;
  const s = String(iso).trim().slice(0,10);
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(s);
  if(m) return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
  const d = new Date(iso);
  return Number.isNaN(d.getTime()) ? null : d;
}

function daysSinceISO(iso){
  const d = parseISODateLocal(iso);
  if(!d) return 0;
  const today = dayStartLocal(new Date());
  const base = dayStartLocal(d);
  const diff = Math.floor((today - base) / (24*60*60*1000));
  return diff < 0 ? 0 : diff;
}

function badgeInfo(lead){
  const nextISO = (lead.proximo_contato || "").trim();

  if(nextISO){
    const nextDate = parseISODateLocal(nextISO);
    if(nextDate){
      const today = dayStartLocal(new Date());
      const nextDay = dayStartLocal(nextDate);

      if(nextDay > today){
        return { text: "agendado", cls: "dt-neutral" };
      }

      const days = daysSinceISO(nextISO);
      if(days <= 2) return { text: days === 0 ? "hoje" : days + " dias", cls: "dt-neutral" };
      if(days <= 4) return { text: days + " dias", cls: "dt-blue" };
      if(days <= 6) return { text: days + " dias", cls: "dt-yellow" };
      return { text: days + " dias", cls: "dt-red" };
    }
  }

  const baseISO = lead.atualizado_em || lead.criado_em || "";
  const days = daysSinceISO(baseISO);

  if(days <= 2) return { text: days === 0 ? "hoje" : days + " dias", cls: "dt-neutral" };
  if(days <= 4) return { text: days + " dias", cls: "dt-blue" };
  if(days <= 6) return { text: days + " dias", cls: "dt-yellow" };
  return { text: days + " dias", cls: "dt-red" };
}

function leadAgeForSorting(lead){
  const nextISO = (lead.proximo_contato || "").trim();

  if(nextISO){
    const nextDate = parseISODateLocal(nextISO);
    if(nextDate){
      const today = dayStartLocal(new Date());
      const nextDay = dayStartLocal(nextDate);

      if(nextDay > today) return -1;
      return daysSinceISO(nextISO);
    }
  }

  return daysSinceISO(lead.atualizado_em || lead.criado_em || "");
}

function nextContactInfo(lead){
  const iso = (lead.proximo_contato || "").trim();
  if(!iso) return null;

  const d = parseISODateLocal(iso);
  if(!d) return null;

  const today = dayStartLocal(new Date());
  const base = dayStartLocal(d);
  const diff = Math.floor((base - today) / (24*60*60*1000));

  const dias = ["dom","seg","ter","qua","qui","sex","sáb"];
  const dow = dias[d.getDay()];
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const text = `${dow} ${dd}/${mm}`;

  if(diff === 0) return { text, cls:"nc-green" };
  if(diff < 0) return { text, cls:"nc-red" };
  return { text, cls:"nc-neutral" };
}

function normalizePhoneBR(phone){
  const digits = String(phone||"").replace(/\D/g,"");
  if(!digits) return "";
  if(digits.startsWith("55")) return digits;
  return "55" + digits;
}

function escapeHtml(str){
  return String(str ?? "").replace(/[&<>"']/g, s => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[s]));
}

function priorityText(p){
  if (p === "Alta") return "Alta";
  if (p === "Média") return "Média";
  return "Baixa";
}

function hasDuplicateActiveName(nome, ignoreId=null){
  const target = (nome || "").trim().toLowerCase();
  if(!target) return false;

  return ALL.some(l => {
    if(ignoreId && l.id === ignoreId) return false;
    if(normalizeEtapa(l.etapa) === "Perdido") return false;
    return String(l.nome || "").trim().toLowerCase() === target;
  });
}

function getLeadsInEtapa(etapa, excludeId=null){
  const e = normalizeEtapa(etapa);
  return ALL
    .filter(x => normalizeEtapa(x.etapa) === e && x.id !== excludeId)
    .map(x => ({...x, ordem: Number(x.ordem)}))
    .filter(x => !Number.isNaN(x.ordem))
    .sort((a,b)=>a.ordem-b.ordem);
}

function orderForTop(etapa, excludeId=null){
  const arr = getLeadsInEtapa(etapa, excludeId);
  if(!arr.length) return ORDER_STEP;
  const min = arr[0].ordem;
  return min - ORDER_STEP;
}

async function sbFetch(path, {method="GET", body=null, prefer="return=representation"} = {}){
  const url = `${SUPABASE_URL}/rest/v1/${path}`;
  const headers = {
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
    "Content-Type": "application/json",
    "Prefer": prefer
  };
  const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : null });

  if(!res.ok){
    let errText = "";
    try{ errText = await res.text(); }catch{}
    throw new Error(`${res.status} ${res.statusText} — ${errText}`);
  }

  if(res.status === 204) return null;
  return await res.json();
}

async function load(){
  try{
    setStatus("warn","Conectando…");
    const data = await sbFetch(`${TABLE}?select=*`);

    ALL = (Array.isArray(data) ? data : []).map(l => ({
      ...l,
      etapa: normalizeEtapa(l.etapa),
      motivo_perda: normalizeMotivoPerda(l.motivo_perda),
      ordem: Number(l.ordem) || Date.now(),
      proximo_contato: (l.proximo_contato || "").slice(0,10)
    }));

    setStatus("ok","Online • Sincronizado");
    render();
  }catch(e){
    setStatus("bad","Sem conexão (ou tabela/política não pronta)");
    console.error(e);
    showToast("Não conectou no Supabase. Abra via URL http/https (não file do PC).");
    render();
  }
}

async function upsertLead(payload, {silent=false} = {}){
  if(!payload.nome || !payload.nome.trim()){
    alert("Nome é obrigatório.");
    return false;
  }

  payload.etapa = normalizeEtapa(payload.etapa);
  payload.motivo_perda = normalizeMotivoPerda(payload.motivo_perda);

  if(payload.etapa !== "Perdido"){
    payload.motivo_perda = "";
  }else{
    if(!payload.motivo_perda){
      alert("Motivo de perda é obrigatório quando Etapa = Perdido.");
      return false;
    }
  }

  payload.atualizado_em = nowISO();

  if(payload.ordem == null || payload.ordem === "") payload.ordem = Date.now();
  payload.ordem = Number(payload.ordem);

  const exists = ALL.some(x => x.id === payload.id);

  try{
    if(exists){
      const { id, ...payloadNoId } = payload;
      const updated = await sbFetch(`${TABLE}?id=eq.${encodeURIComponent(id)}`, {
        method: "PATCH",
        body: payloadNoId
      });
      const u = Array.isArray(updated) ? updated[0] : payload;
      const idx = ALL.findIndex(x=>x.id===payload.id);
      if(idx >= 0) ALL[idx] = u;
    }else{
      payload.id = payload.id || crypto.randomUUID();
      payload.criado_em = payload.criado_em || nowISO();
      const inserted = await sbFetch(TABLE, { method:"POST", body: payload });
      const i = Array.isArray(inserted) ? inserted[0] : payload;
      ALL.unshift(i);
    }

    if(!silent){
      showToast("Lead salvo.");
      render();
    }
    return true;
  }catch(e){
    console.error(e);
    alert("Não consegui salvar no Supabase. Provável: RLS/política, tabela, ou coluna proximo_contato não criada.");
    return false;
  }
}

async function deleteLead(id){
  const lead = ALL.find(x=>x.id===id);
  if(!lead) return;
  const ok = confirm(`Excluir o lead "${lead.nome}"? Isso não tem volta.`);
  if(!ok) return;

  try{
    await sbFetch(`${TABLE}?id=eq.${encodeURIComponent(id)}`, { method:"DELETE", prefer:"return=minimal" });
    ALL = ALL.filter(x=>x.id!==id);
    showToast("Lead excluído.");
    render();
  }catch(e){
    console.error(e);
    alert("Não consegui excluir no Supabase. Provável: RLS/política.");
  }
}

async function moveLeadWithOrder(id, etapa){
  const idx = ALL.findIndex(x=>x.id===id);
  if(idx < 0) return;

  const current = ALL[idx];
  const etapaNorm = normalizeEtapa(etapa);

  if(etapaNorm === "Perdido" && !current.motivo_perda){
    openEdit(id, true);
    return;
  }

  const ordemTopo = orderForTop(etapaNorm, id);
  const next = {...current, etapa: etapaNorm, ordem: ordemTopo};

  if(next.etapa !== "Perdido") next.motivo_perda = "";

  await upsertLead(next);
}

function wireDnD(){
  document.querySelectorAll(".card").forEach(card=>{
    card.addEventListener("dragstart", (e)=>{
      isDragging = true;
      e.dataTransfer.setData("text/plain", card.dataset.id);
      e.dataTransfer.effectAllowed = "move";
    });

    card.addEventListener("dragend", ()=>{
      setTimeout(()=>{ isDragging = false; }, 0);
    });

    card.addEventListener("click", ()=>{
      if(isDragging) return;
      openEdit(card.dataset.id);
    });
  });

  document.querySelectorAll(".dropzone").forEach(zone=>{
    zone.addEventListener("dragover", (e)=>{
      e.preventDefault();
      zone.classList.add("dragover");
    });

    zone.addEventListener("dragleave", ()=>{
      zone.classList.remove("dragover");
    });

    zone.addEventListener("drop", async (e)=>{
      e.preventDefault();
      zone.classList.remove("dragover");

      const id = e.dataTransfer.getData("text/plain");
      const etapa = zone.dataset.drop;
      if(!id || !etapa) return;

      try{
        await moveLeadWithOrder(id, etapa);
      }catch(err){
        console.error(err);
        showToast("Falha ao mover. Verifique conexão/RLS.");
      }
    });
  });
}

function sortByPriorityAndOrder(a,b){
  const aAlta = (a.prioridade || "") === "Alta";
  const bAlta = (b.prioridade || "") === "Alta";

  if(aAlta && !bAlta) return -1;
  if(!aAlta && bAlta) return 1;

  const ageA = leadAgeForSorting(a);
  const ageB = leadAgeForSorting(b);

  if(ageA !== ageB) return ageB - ageA;

  const ta = new Date(a.atualizado_em || a.criado_em || 0).getTime();
  const tb = new Date(b.atualizado_em || b.criado_em || 0).getTime();
  if(ta !== tb) return ta - tb;

  const oa = Number(a.ordem);
  const ob = Number(b.ordem);
  if(!Number.isNaN(oa) && !Number.isNaN(ob) && oa !== ob) return oa - ob;

  return 0;
}

function sortStandbyGrouped(a,b){
  const ea = (a.empreendimento || "").toLowerCase();
  const eb = (b.empreendimento || "").toLowerCase();
  if(ea !== eb) return ea.localeCompare(eb, "pt-BR");

  const na = (a.nome || "").toLowerCase();
  const nb = (b.nome || "").toLowerCase();
  return na.localeCompare(nb, "pt-BR");
}

function toCSV(rows){
  const headers = [
    "id","ordem","data_inicio","proximo_contato",
    "nome","telefone","empreendimento","etapa","prioridade",
    "origem","responsavel","motivo_perda","observacao",
    "criado_em","atualizado_em"
  ];
  const esc = (v)=> {
    const s = String(v ?? "");
    if(/[",\n;]/.test(s)) return `"${s.replace(/"/g,'""')}"`;
    return s;
  };
  const lines = [headers.join(",")];
  rows.forEach(r=> lines.push(headers.map(h=>esc(r[h])).join(",")));
  return lines.join("\n");
}

function download(filename, text){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([text], {type:"text/csv;charset=utf-8"}));
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

async function importCSV(text){
  const isMeta = text.includes("full_name") && text.includes("created_time");

  if(isMeta){
    const rows = text.split("\n").map(r => r.split("\t")).filter(r => r.length > 1);
    if(rows.length < 2){ alert("CSV do Meta vazio."); return; }

    const headers = rows[0].map(h => h.trim());
    const idx = (name) => headers.indexOf(name);

    const objs = rows.slice(1).map(r => {
      const rawPhone = r[idx("phone_number")] || "";
      const cleanPhone = rawPhone.replace(/\D/g,"");

      const rawDate = r[idx("created_time")] || "";
      const dataISO = rawDate ? rawDate.substring(0,10) : todayISO();

      return {
        id: crypto.randomUUID(),
        ordem: orderForTop("Novo", null),
        data_inicio: dataISO,
        proximo_contato: null,
        nome: (r[idx("full_name")] || "").replace(/^"+|"+$/g, "").trim(),
        telefone: (cleanPhone.length >= 12 && cleanPhone.startsWith("55")) ? cleanPhone.slice(2) : (cleanPhone.length >= 10 ? cleanPhone : ""),
        empreendimento: "Evolutti",
        etapa: "Novo",
        prioridade: "Alta",
        origem: "Meta",
        responsavel: "Sanchai",
        motivo_perda: "",
        observacao: "",
        criado_em: nowISO(),
        atualizado_em: nowISO()
      };
    });

    for(const o of objs){
      await upsertLead(o, {silent:true});
    }

    showToast("Leads do Meta importados.");
    await load();
    return;
  }

  alert("Formato de CSV não reconhecido.");
}

  download(`crm-leads-senger-${todayISO()}.csv`, csv);
});

document.querySelector("#importCsv").addEventListener("click", ()=>{
  fileInput.value = "";
  fileInput.click();
});
fileInput.addEventListener("change", async ()=>{
  const f = fileInput.files?.[0];
  if(!f) return;
  const text = await f.text();
  await importCSV(text);
});

function updateBadgesOnly(){
  document.querySelectorAll(".card").forEach(card=>{
    const id = card.dataset.id;
    const lead = ALL.find(x => x.id === id);
    if(!lead) return;

    const etapaNorm = normalizeEtapa(lead.etapa);
    if(etapaNorm === "Perdido" || etapaNorm === "Stand by") return;

    const b = badgeInfo(lead);
    const dtEl = card.querySelector(".dt");
    if(dtEl){
      dtEl.className = `dt ${b.cls}`;
      dtEl.textContent = b.text;
    }
  });
}
setInterval(updateBadgesOnly, 60 * 1000);

adjustMainHeight();
window.addEventListener("resize", adjustMainHeight);
load();
</script>
</body>
</html>
