<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CRM — Leads Senger (Kanban)</title>
<style>
  :root{
    --bg:#07162B;
    --bg-2:#0B2140;
    --bg-3:#12325D;

    --card:#F4F7FB;
    --card-soft:#EDF3F9;
    --text:#16263A;
    --muted:#6B7280;
    --line:#D6E0EA;
    --shadow:0 10px 24px rgba(3,12,28,.22);
    --r:16px;

    --teal:#0E2A47;
    --teal-2:#173A63;
    --danger:#D64545;
    --ok:#16A34A;
    --warn-orange:#E67E22;

    --gold:#C9A96A;
    --gold-2:#B8935A;
    --gold-soft:#E8D7B1;

    --blue-accent:#2E5B88;
    --blue-accent-2:#3A6EA5;
    --white:#FFFFFF;
  }

  *{box-sizing:border-box}

  html,body{height:100%}

  body{
    margin:0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
    color:var(--text);
    background:
      radial-gradient(circle at 12% 10%, rgba(58,110,165,.22) 0%, transparent 26%),
      radial-gradient(circle at 85% 18%, rgba(201,169,106,.10) 0%, transparent 20%),
      linear-gradient(180deg,#0A1C35 0%, #0A2343 40%, #081A31 100%);
    background-attachment: fixed;
  }

  *::-webkit-scrollbar{
    width:10px;
    height:10px;
  }

  *::-webkit-scrollbar-track{
    background:rgba(18,50,93,.22);
    border-radius:999px;
  }

  *::-webkit-scrollbar-thumb{
    background:linear-gradient(180deg,#2D5C8D 0%, #18395F 100%);
    border-radius:999px;
    border:2px solid rgba(255,255,255,.06);
  }

  *::-webkit-scrollbar-thumb:hover{
    background:linear-gradient(180deg,#3C72AA 0%, #20466F 100%);
  }

  header{
    position:sticky;
    top:0;
    z-index:20;
    background:linear-gradient(180deg,#11294B 0%, #0D2341 100%);
    border-bottom:1px solid rgba(255,255,255,.08);
    box-shadow:0 8px 22px rgba(3,12,28,.18);
    backdrop-filter: blur(8px);
  }

  .wrap{
    max-width:1600px;
    margin:0 auto;
    padding:8px 16px;
  }

  .top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
  }

  .title{
    display:flex;
    flex-direction:column;
    gap:2px;
  }

  .titleRow{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    width:100%;
  }

  .subtitleInline{
    margin-left:auto;
    font-size:12px;
    color:rgba(255,255,255,.72);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:900px;
  }

  .title h1{
    font-size:16px;
    margin:0;
    color:#FFFFFF;
    font-weight:950;
  }

  .actions{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
  }

  .btn{
    border:1px solid rgba(255,255,255,.12);
    background:#FFFFFF;
    padding:10px 14px;
    border-radius:14px;
    cursor:pointer;
    font-weight:850;
    box-shadow:0 3px 10px rgba(4,16,34,.10);
    color:var(--text);
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:.15s ease;
  }

  .btn:hover{ filter:brightness(.98); }

  .btn.primary{
    background:linear-gradient(180deg,#1B3A61 0%, #0E2A47 100%);
    color:#fff;
    border-color:rgba(255,255,255,.08);
  }

  .btn.danger{
    background:var(--danger);
    color:#fff;
    border-color:transparent;
  }

  .input, select, textarea{
    border:1px solid rgba(255,255,255,.12);
    background:#143154;
    padding:10px 12px;
    border-radius:14px;
    outline:none;
    min-width:160px;
    color:#FFFFFF;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
  }

  .input::placeholder,
  textarea::placeholder{
    color:rgba(255,255,255,.58);
  }

  select option{
    background:#163252;
    color:#FFFFFF;
  }

  .searchWrap{
    position:relative;
    display:inline-flex;
    align-items:center;
  }

  .searchWrap .input{ padding-right:38px; }

  .clearBtn{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    border:0;
    background:transparent;
    cursor:pointer;
    font-size:18px;
    line-height:1;
    color:rgba(255,255,255,.72);
    width:26px;
    height:26px;
    border-radius:999px;
    display:none;
    align-items:center;
    justify-content:center;
  }

  .clearBtn:hover{ background:rgba(255,255,255,.10); }
  .clearBtn.show{ display:inline-flex; }

  .hint{
    font-size:12px;
    color:rgba(255,255,255,.56);
    margin-top:5px;
  }

  main .wrap{
    padding-top:16px;
    height:calc(100vh - 132px);
  }

  .board{
    display:grid;
    grid-auto-flow:column;
    grid-auto-columns:minmax(235px, .76fr);
    gap:16px;
    overflow:auto;
    height:100%;
    padding-bottom:14px;
  }

  .col{
    background:
      linear-gradient(180deg, rgba(31,59,100,.96) 0%, rgba(16,38,70,.98) 100%);
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    box-shadow:0 14px 30px rgba(3,12,28,.22);
    min-height:280px;
    display:flex;
    flex-direction:column;
    height:100%;
    position:relative;
  }

  .col::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:18px;
    pointer-events:none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
  }

  .colHead{
    padding:14px 14px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid rgba(255,255,255,.08);
    gap:10px;
    background:linear-gradient(180deg,rgba(255,255,255,.03) 0%, rgba(255,255,255,0) 100%);
    border-top-left-radius:18px;
    border-top-right-radius:18px;
  }

  .colHead .name{
    font-weight:950;
    font-size:12px;
    letter-spacing:.3px;
    color:#FFFFFF;
  }

  .colHead .count{
    font-size:11px;
    font-weight:900;
    color:#FFFFFF;
    background:rgba(255,255,255,.12);
    padding:5px 8px;
    border-radius:999px;
    white-space:nowrap;
    border:1px solid rgba(255,255,255,.08);
  }

  .dropzone{
    padding:12px;
    display:flex;
    flex-direction:column;
    gap:10px;
    flex:1;
    overflow-y:auto;
  }

  .dropzone.dragover{
    outline:2px dashed rgba(255,255,255,.28);
    outline-offset:-6px;
    border-radius:14px;
  }

  .dropzone::-webkit-scrollbar{
    width:12px;
  }

  .dropzone::-webkit-scrollbar-track{
    background:rgba(255,255,255,.06);
    border-radius:999px;
  }

  .dropzone::-webkit-scrollbar-thumb{
    background:linear-gradient(180deg,#2F6499 0%, #18395E 100%);
    border-radius:999px;
    border:2px solid rgba(255,255,255,.06);
  }

  .dropzone::-webkit-scrollbar-thumb:hover{
    background:linear-gradient(180deg,#3B76B4 0%, #1F4975 100%);
  }

  .card{
    background:linear-gradient(180deg,#F8FAFD 0%, #EEF3F9 100%);
    border:1px solid #D8E2EC;
    border-radius:16px;
    padding:12px 12px;
    box-shadow:0 6px 14px rgba(10,26,49,.12);
    cursor:grab;
    user-select:none;
    position:relative;
    transition:.14s ease;
  }

  .card:hover{
    transform:translateY(-1px);
  }

  .card:active{ cursor:grabbing; }

  .card.high-priority{
    background:
      linear-gradient(180deg,#FCF9F1 0%, #F4ECDD 100%);
    border:2px solid rgba(201,169,106,.92);
    box-shadow:
      0 10px 22px rgba(8,22,43,.18),
      inset 0 0 0 1px rgba(255,255,255,.45);
  }

  .card.high-priority::before{
    content:"";
    position:absolute;
    left:0;
    top:0;
    bottom:0;
    width:8px;
    background:linear-gradient(180deg,#D6B97B 0%, #B8935A 100%);
    border-top-left-radius:16px;
    border-bottom-left-radius:16px;
  }

  .card.high-priority::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    border-radius:16px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.55);
  }

  .card.high-priority .nm{
    color:#15253A;
    font-weight:980;
  }

  .card.high-priority .emp{
    color:#5A6777;
    font-weight:700;
  }

  .card.high-priority .sub-row{
    color:#5A6777;
  }

  .row1{
    display:flex;
    justify-content:space-between;
    gap:8px;
    align-items:flex-start;
  }

  .nm{
    font-weight:950;
    font-size:13px;
    line-height:1.2;
    color:var(--text);
  }

  .prioText{
    font-size:12px;
    color:#7B8490;
    font-weight:800;
    white-space:nowrap;
  }

  .sub-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    font-size:12px;
    color:var(--muted);
    margin-top:7px;
  }

  .leftGroup{
    display:flex;
    align-items:center;
    gap:8px;
    min-width:0;
    flex:1;
  }

  .leftGroup .emp{
    font-weight:700;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    min-width:0;
    color:#677383;
  }

  .nc{
    padding:5px 10px;
    border-radius:999px;
    white-space:nowrap;
    font-weight:850;
    border:1px solid transparent;
    font-size:12px;
    line-height:1;
    flex:0 0 auto;
  }

  .nc-neutral{
    background:#E7EEF6;
    color:#35506D;
    border:1px solid #D3DFEC;
  }

  .nc-green{
    background:#16A34A;
    color:#FFFFFF;
    border-color:transparent;
  }

  .nc-red{
    background:var(--danger);
    color:#ffffff;
    border-color:transparent;
  }

  .sub-row .dt{
    padding:4px 10px;
    border-radius:999px;
    white-space:nowrap;
    font-weight:800;
    border:1px solid transparent;
    flex:0 0 auto;
  }

  .dt-neutral{
    background:#E7EEF6;
    color:#35506D;
    border:1px solid #D3DFEC;
  }

  .dt-green{
    background:#16A34A;
    color:#ffffff;
    border-color:transparent;
  }

  .dt-orange{
    background:#E67E22;
    color:#ffffff;
    border-color:transparent;
  }

  .dt-red{
    background:#D64545;
    color:#ffffff;
    border-color:transparent;
  }

  .standbyLine{
    display:flex;
    align-items:center;
    gap:8px;
    min-width:0;
  }

  .standbyLine .nm{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    min-width:0;
  }

  .standbyLine .sep{
    opacity:.45;
    flex:0 0 auto;
    color:var(--muted);
  }

  .standbyLine .empInline{
    font-weight:700;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    min-width:0;
    flex:1;
  }

  dialog{
    border:0;
    border-radius:16px;
    box-shadow:0 20px 60px rgba(14,42,71,.30);
    width:min(860px, 92vw);
    max-height:88vh;
    padding:0;
    background:#FFFFFF;
    color:var(--text);
  }

  dialog::backdrop{
    background:rgba(7,22,43,.45);
  }

  .modal{
    display:flex;
    flex-direction:column;
    height:88vh;
    max-height:88vh;
    background:#FFFFFF;
  }

  .modalHead{
    padding:12px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    border-bottom:1px solid var(--line);
    background:#FFFFFF;
    position:sticky;
    top:0;
    z-index:2;
  }

  .modalHead .t{
    font-weight:980;
    color:var(--teal);
  }

  .modalBody{
    padding:12px 14px;
    overflow:auto;
    background:#FFFFFF;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px 12px;
  }

  .grid .full{ grid-column:1/-1; }

  .lbl{
    font-size:12px;
    color:var(--muted);
    margin:0 0 4px 2px;
  }

  textarea{
    width:100%;
    min-height:64px;
    resize:vertical;
  }

  .modalBody .input,
  .modalBody select,
  .modalBody textarea{
    background:#F7FAFD;
    color:#16263A;
    border:1px solid #D6E0EA;
    box-shadow:none;
  }

  .modalBody .input::placeholder,
  .modalBody textarea::placeholder{
    color:#7B8490;
  }

  .modalBody select option{
    background:#FFFFFF;
    color:#16263A;
  }

  .modalFoot{
    padding:10px 14px;
    display:flex;
    justify-content:flex-end;
    gap:10px;
    flex-wrap:wrap;
    border-top:1px solid var(--line);
    background:#FFFFFF;
    position:sticky;
    bottom:0;
    z-index:2;
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:16px;
    transform:translateX(-50%);
    background:var(--teal);
    color:#fff;
    padding:10px 12px;
    border-radius:12px;
    font-size:12px;
    box-shadow:0 12px 34px rgba(14,42,71,.22);
    opacity:0;
    pointer-events:none;
    transition:.18s ease;
    z-index:50;
    border:1px solid transparent;
  }

  .toast.show{ opacity:1; }

  .totalBox{
    margin-left:0;
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    border-radius:16px;
    background:linear-gradient(180deg,#1A365D 0%, #102846 100%);
    border:1px solid rgba(255,255,255,.10);
    box-shadow:0 4px 12px rgba(4,16,34,.10);
    white-space:nowrap;
  }

  .totalBox .t{
    font-size:12px;
    color:rgba(255,255,255,.74);
    font-weight:850;
  }

  .totalBox .n{
    font-size:18px;
    font-weight:980;
    color:#FFFFFF;
    line-height:1;
  }

  .pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:6px 10px;
    border-radius:999px;
    background:linear-gradient(180deg,#1A365D 0%, #102846 100%);
    border:1px solid rgba(255,255,255,.10);
    white-space:nowrap;
    font-weight:850;
    color:#FFFFFF;
    box-shadow:0 2px 8px rgba(14,42,71,.05);
  }

  .dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--muted);
    display:inline-block;
  }

  .dot.ok{ background:#16A34A; }
  .dot.warn{ background:#C9A96A; }
  .dot.bad{ background:#D64545; }

  @media(max-width:820px){
    header{ position:static; }
    .wrap{ padding:8px 12px; }

    .titleRow{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      align-items:center;
      width:100%;
    }

    .title h1{
      grid-column:1 / -1;
      font-size:16px;
      margin:0;
    }

    .subtitleInline{ display:none; }
    .statusbar{ grid-column:1 / -1; }

    .totalBox{
      width:100%;
      justify-content:space-between;
      padding:9px 10px;
      grid-column:1 / -1;
    }

    .actions{
      width:100%;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:10px;
    }

    .searchWrap{
      grid-column:1 / -1;
      width:100%;
    }

    #q{
      width:100%;
      min-width:0;
    }

    #fEmp, #fOrig, #fResp, #fPri{
      width:100%;
      min-width:0;
    }

    .btn{
      padding:11px 12px;
      border-radius:14px;
      width:100%;
    }

    #new{
      grid-column:1 / -1;
      font-size:15px;
      padding:12px 14px;
    }

    main .wrap{
      padding-top:10px;
      height:auto;
      min-height:calc(100vh - 10px);
    }

    .board{
      grid-auto-columns:minmax(240px, 0.92fr);
      height:auto;
      min-height:calc(100vh - 10px);
    }

    dialog{
      width:96vw;
      max-height:92vh;
    }

    .modal{
      height:92vh;
      max-height:92vh;
    }

    .grid{
      grid-template-columns:1fr;
      gap:8px;
    }
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="top">
      <div class="title">
        <div class="titleRow">
          <h1>CRM — Leads Senger</h1>

          <div class="statusbar" id="statusbar">
            <span class="pill"><span class="dot warn"></span>Conectando…</span>
          </div>

          <div class="subtitleInline">Kanban arrastável + formulário com listas. <b>Sincronizado</b> (Supabase).</div>

          <div class="totalBox" id="totalBox">
            <span class="t">Leads ativos</span>
            <span class="n">0</span>
          </div>

          <div class="totalBox" id="lostBox" title="Clique em 'Mostrar perdidos' para visualizar">
            <span class="t">Leads perdidos</span>
            <span class="n">0</span>
          </div>

          <div class="totalBox" id="allBox">
            <span class="t">Leads totais</span>
            <span class="n">0</span>
          </div>

          <button class="btn primary" id="new" type="button">+ Novo Lead</button>
        </div>
      </div>

      <div class="actions">
        <div class="searchWrap">
          <input id="q" class="input" placeholder="Buscar nome/telefone..." />
          <button class="clearBtn" id="clearQ" type="button" aria-label="Limpar busca">×</button>
        </div>

        <select id="fEmp"></select>
        <select id="fOrig"></select>
        <select id="fResp"></select>
        <select id="fPri"></select>

        <button class="btn" id="toggleLost" type="button">Mostrar perdidos</button>
        <button class="btn" id="exportCsv" type="button">Exportar CSV</button>
        <button class="btn" id="importCsv" type="button">Importar CSV</button>
      </div>
    </div>

    <div class="hint"></div>
  </div>
</header>

<main>
  <div class="wrap" id="mainWrap">
    <div id="board" class="board"></div>
  </div>
</main>

<div class="toast" id="toast">Salvo.</div>

<dialog id="dlg">
  <form class="modal" id="form">
    <div class="modalHead">
      <div class="t" id="dlgTitle">Novo Lead</div>
      <button class="btn" type="button" id="closeDlg">Fechar</button>
    </div>

    <div class="modalBody">
      <div class="grid">
        <div>
          <p class="lbl">Data início</p>
          <input class="input" name="data_inicio" type="date" />
        </div>

        <div>
          <p class="lbl">Próximo contato</p>
          <input class="input" name="proximo_contato" type="date" />
        </div>

        <div>
          <p class="lbl">Prioridade</p>
          <select class="input" name="prioridade"></select>
        </div>

        <div class="full">
          <p class="lbl">Nome *</p>
          <input class="input" name="nome" placeholder="Ex.: João Silva" required />
        </div>

        <div>
          <p class="lbl">Telefone</p>
          <input class="input" name="telefone" placeholder="Ex.: 54999013331" />
        </div>

        <div>
          <p class="lbl">Empreendimento</p>
          <select class="input" name="empreendimento"></select>
        </div>

        <div>
          <p class="lbl">Etapa</p>
          <select class="input" name="etapa"></select>
        </div>

        <div>
          <p class="lbl">Origem</p>
          <select class="input" name="origem"></select>
        </div>

        <div>
          <p class="lbl">Responsável</p>
          <select class="input" name="responsavel"></select>
        </div>

        <div>
          <p class="lbl">Motivo de perda</p>
          <select class="input" name="motivo_perda"></select>
        </div>

        <div class="full">
          <p class="lbl">Observação</p>
          <textarea class="input" name="observacao" placeholder="Notas rápidas..."></textarea>
        </div>
      </div>
    </div>

    <div class="modalFoot">
      <button class="btn danger" id="deleteBtn" type="button" style="display:none;">Excluir</button>
      <button class="btn" type="button" id="cancelBtn">Cancelar</button>
      <button class="btn primary" id="save" type="submit">Salvar</button>
    </div>
  </form>
</dialog>

<input id="file" type="file" accept=".csv" style="display:none;" />

<script>
const SUPABASE_URL = "https://lnrbpiklzymblpyrobwx.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_KXVbF3c7RGFXVTtfYmrzzg_dMK04Q9q";
const TABLE = "leads";

const SHOW_WA_ON_CARD = false;

const LISTS = {
  empreendimento: ["Personalité","Quality","Prime","Evolutti","Boulevard","Premium Office","Renaissance","NVR I–II","NVR III","Outros"],
  etapa: ["Novo","Em atendimento","Evoluindo","Negociação","Stand by","Perdido"],
  prioridade: ["Alta","Média","Baixa"],
  origem: ["Meta","Instagram","Indicação","Corretor","Site","WhatsApp","Ligação","Presencial"],
  responsavel: ["Sanchai","Miguel","Cristian","Corretor"],
  motivo_perda: [

function todayISO(){
  const d = new Date();
  const tz = d.getTimezoneOffset() * 60000;
  return new Date(d - tz).toISOString().slice(0,10);
}

function nowISO(){
  return new Date().toISOString();
}

function dayStartLocal(d){
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function parseISODateLocal(iso){
  if(!iso) return null;
  const s = String(iso).trim().slice(0,10);
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(s);
  if(m) return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
  const d = new Date(iso);
  return Number.isNaN(d.getTime()) ? null : d;
}

function daysSinceISO(iso){
  const d = parseISODateLocal(iso);
  if(!d) return 0;
  const today = dayStartLocal(new Date());
  const base = dayStartLocal(d);
  const diff = Math.floor((today - base) / (24*60*60*1000));
  return diff < 0 ? 0 : diff;
}

function badgeInfo(lead){
  const nextISO = (lead.proximo_contato || "").trim();

  if(nextISO){
    const nextDate = parseISODateLocal(nextISO);
    if(nextDate){
      const today = dayStartLocal(new Date());
      const nextDay = dayStartLocal(nextDate);

      if(nextDay > today){
        return { text: "agendado", cls: "dt-neutral" };
      }

      const days = daysSinceISO(nextISO);

      if(days <= 2) return { text: days === 0 ? "hoje" : days + " dias", cls: "dt-neutral" };
      if(days <= 5) return { text: days + " dias", cls: "dt-green" };
      if(days <= 8) return { text: days + " dias", cls: "dt-orange" };
      return { text: days + " dias", cls: "dt-red" };
    }
  }

  const baseISO = lead.atualizado_em || lead.criado_em || "";
  const days = daysSinceISO(baseISO);

  if(days <= 2) return { text: days === 0 ? "hoje" : days + " dias", cls: "dt-neutral" };
  if(days <= 5) return { text: days + " dias", cls: "dt-green" };
  if(days <= 8) return { text: days + " dias", cls: "dt-orange" };
  return { text: days + " dias", cls: "dt-red" };
}

function leadAgeForSorting(lead){
  const nextISO = (lead.proximo_contato || "").trim();

  if(nextISO){
    const nextDate = parseISODateLocal(nextISO);
    if(nextDate){
      const today = dayStartLocal(new Date());
      const nextDay = dayStartLocal(nextDate);

      if(nextDay > today) return -1;
      return daysSinceISO(nextISO);
    }
  }

  return daysSinceISO(lead.atualizado_em || lead.criado_em || "");
}

function nextContactInfo(lead){
  const iso = (lead.proximo_contato || "").trim();
  if(!iso) return null;

  const d = parseISODateLocal(iso);
  if(!d) return null;

  const today = dayStartLocal(new Date());
  const base = dayStartLocal(d);
  const diff = Math.floor((base - today) / (24*60*60*1000));

  const dias = ["dom","seg","ter","qua","qui","sex","sáb"];
  const dow = dias[d.getDay()];
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const text = `${dow} ${dd}/${mm}`;

  if(diff === 0) return { text, cls:"nc-green" };
  return { text, cls:"nc-neutral" };
}

function normalizePhoneBR(phone){
  const digits = String(phone||"").replace(/\D/g,"");
  if(!digits) return "";
  if(digits.startsWith("55")) return digits;
  return "55" + digits;
}

function escapeHtml(str){
  return String(str ?? "").replace(/[&<>"']/g, s => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[s]));
}

function hasDuplicateActiveName(nome, ignoreId=null){
  const target = (nome || "").trim().toLowerCase();
  if(!target) return false;

  return ALL.some(l => {
    if(ignoreId && l.id === ignoreId) return false;
    if(normalizeEtapa(l.etapa) === "Perdido") return false;
    return String(l.nome || "").trim().toLowerCase() === target;
  });
}

function getLeadsInEtapa(etapa, excludeId=null){
  const e = normalizeEtapa(etapa);
  return ALL
    .filter(x => normalizeEtapa(x.etapa) === e && x.id !== excludeId)
    .map(x => ({...x, ordem: Number(x.ordem)}))
    .filter(x => !Number.isNaN(x.ordem))
    .sort((a,b)=>a.ordem-b.ordem);
}

function orderForTop(etapa, excludeId=null){
  const arr = getLeadsInEtapa(etapa, excludeId);
  if(!arr.length) return ORDER_STEP;
  const min = arr[0].ordem;
  return min - ORDER_STEP;
}

async function sbFetch(path, {method="GET", body=null, prefer="return=representation"} = {}){
  const url = `${SUPABASE_URL}/rest/v1/${path}`;
  const headers = {
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
    "Content-Type": "application/json",
    "Prefer": prefer
  };

  const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : null });

  if(!res.ok){
    let errText = "";
    try{ errText = await res.text(); }catch{}
    throw new Error(`${res.status} ${res.statusText} — ${errText}`);
  }

  if(res.status === 204) return null;
  return await res.json();
}

async function load(){

    console.error(e);
    showToast("Não conectou no Supabase. Abra via URL http/https (não file do PC).");
    render();
  }
}

async function upsertLead(payload, {silent=false} = {}){
  if(!payload.nome || !payload.nome.trim()){
    alert("Nome é obrigatório.");
    return false;
  }

  payload.etapa = normalizeEtapa(payload.etapa);
  payload.motivo_perda = normalizeMotivoPerda(payload.motivo_perda);

  if(payload.etapa !== "Perdido"){
    payload.motivo_perda = "";
  }else{
    if(!payload.motivo_perda){
      alert("Motivo de perda é obrigatório quando Etapa = Perdido.");
      return false;
    }
  }

  payload.atualizado_em = nowISO();

  if(payload.ordem == null || payload.ordem === "") payload.ordem = Date.now();
  payload.ordem = Number(payload.ordem);

  const exists = ALL.some(x => x.id === payload.id);

  try{
    if(exists){
      const { id, ...payloadNoId } = payload;
      const updated = await sbFetch(`${TABLE}?id=eq.${encodeURIComponent(id)}`, {
        method: "PATCH",
        body: payloadNoId
      });

      const u = Array.isArray(updated) ? updated[0] : payload;
      const idx = ALL.findIndex(x=>x.id===payload.id);
      if(idx >= 0) ALL[idx] = u;
    }else{
      payload.id = payload.id || crypto.randomUUID();
      payload.criado_em = payload.criado_em || nowISO();

      const inserted = await sbFetch(TABLE, { method:"POST", body: payload });
      const i = Array.isArray(inserted) ? inserted[0] : payload;
      ALL.unshift(i);
    }

    if(!silent){
      showToast("Lead salvo.");
      render();
    }

    return true;
  }catch(e){
    console.error(e);
    alert("Não consegui salvar no Supabase. Provável: RLS/política, tabela, ou coluna proximo_contato não criada.");
    return false;
  }
}

async function deleteLead(id){
  const lead = ALL.find(x=>x.id===id);
  if(!lead) return;

  const ok = confirm(`Excluir o lead "${lead.nome}"? Isso não tem volta.`);
  if(!ok) return;

  try{
    await sbFetch(`${TABLE}?id=eq.${encodeURIComponent(id)}`, {
      method:"DELETE",
      prefer:"return=minimal"
    });

    ALL = ALL.filter(x=>x.id!==id);
    showToast("Lead excluído.");
    render();
  }catch(e){
    console.error(e);
    alert("Não consegui excluir no Supabase. Provável: RLS/política.");
  }
}

  F.etapa.value = forcePerdido ? "Perdido" : normalizeEtapa(lead.etapa || "Novo");
  F.prioridade.value = lead.prioridade || "Baixa";
  F.origem.value = lead.origem || "Instagram";

  F.motivo_perda.value = normalizeMotivoPerda(lead.motivo_perda || "");

  });

  dlg.showModal();
}

  const payload = {
    id: editingId || crypto.randomUUID(),
    ordem: editingId ? (Number(existing?.ordem) || Date.now()) : orderForTop(etapaEscolhida, null),
    data_inicio: F.data_inicio.value || todayISO(),
    proximo_contato: (F.proximo_contato.value && F.proximo_contato.value.trim()) ? F.proximo_contato.value.trim() : null,
    nome,
    telefone: F.telefone.value.trim(),

    prioridade: F.prioridade.value,
    origem: F.origem.value,

    motivo_perda: (F.etapa.value === "Perdido") ? normalizeMotivoPerda(F.motivo_perda.value) : "",
    observacao: F.observacao.value.trim(),

async function moveLeadWithOrder(id, etapa){
  const idx = ALL.findIndex(x=>x.id===id);
  if(idx < 0) return;

  const current = ALL[idx];
  const etapaNorm = normalizeEtapa(etapa);

  if(etapaNorm === "Perdido" && !current.motivo_perda){
    openEdit(id, true);
    return;
  }

  const ordemTopo = orderForTop(etapaNorm, id);
  const next = {...current, etapa: etapaNorm, ordem: ordemTopo};

  if(next.etapa !== "Perdido") next.motivo_perda = "";

  await upsertLead(next);
}

function wireDnD(){

      isDragging = true;
      e.dataTransfer.setData("text/plain", card.dataset.id);
      e.dataTransfer.effectAllowed = "move";
    });

    card.addEventListener("dragend", ()=>{
      setTimeout(()=>{ isDragging = false; }, 0);
    });

    card.addEventListener("click", ()=>{
      if(isDragging) return;
      openEdit(card.dataset.id);
    });
  });

  document.querySelectorAll(".dropzone").forEach(zone=>{
    zone.addEventListener("dragover", (e)=>{
      e.preventDefault();
      zone.classList.add("dragover");
    });

    zone.addEventListener("dragleave", ()=>{
      zone.classList.remove("dragover");
    });

    zone.addEventListener("drop", async (e)=>{
      e.preventDefault();
      zone.classList.remove("dragover");

      const id = e.dataTransfer.getData("text/plain");
      const etapa = zone.dataset.drop;
      if(!id || !etapa) return;

      try{
        await moveLeadWithOrder(id, etapa);
      }catch(err){
        console.error(err);
        showToast("Falha ao mover. Verifique conexão/RLS.");
      }
    });
  });
}

function sortByPriorityAndOrder(a,b){
  const aAlta = (a.prioridade || "") === "Alta";
  const bAlta = (b.prioridade || "") === "Alta";

  if(aAlta && !bAlta) return -1;
  if(!aAlta && bAlta) return 1;

  const ageA = leadAgeForSorting(a);
  const ageB = leadAgeForSorting(b);

  if(ageA !== ageB) return ageB - ageA;

  const ta = new Date(a.atualizado_em || a.criado_em || 0).getTime();
  const tb = new Date(b.atualizado_em || b.criado_em || 0).getTime();
  if(ta !== tb) return ta - tb;

  const oa = Number(a.ordem);
  const ob = Number(b.ordem);
  if(!Number.isNaN(oa) && !Number.isNaN(ob) && oa !== ob) return oa - ob;

  return 0;
}

function sortStandbyGrouped(a,b){
  const ea = (a.empreendimento || "").toLowerCase();
  const eb = (b.empreendimento || "").toLowerCase();
  if(ea !== eb) return ea.localeCompare(eb, "pt-BR");

  const na = (a.nome || "").toLowerCase();
  const nb = (b.nome || "").toLowerCase();
  return na.localeCompare(nb, "pt-BR");
}

function render(){
  const leads = filtered();

  const totalAtivos = leads.filter(l => normalizeEtapa(l.etapa || "Novo") !== "Perdido").length;
  const totalPerdidos = leads.filter(l => normalizeEtapa(l.etapa || "Novo") === "Perdido").length;
  const totalTodos = totalAtivos + totalPerdidos;

  totalBox.querySelector(".n").textContent = totalAtivos;
  lostBox.querySelector(".n").textContent = totalPerdidos;
  allBox.querySelector(".n").textContent = totalTodos;

  toggleLostBtn.textContent = SHOW_LOST ? "Ocultar perdidos" : "Mostrar perdidos";

  elBoard.innerHTML = "";

  const etapasNoBoard = LISTS.etapa.filter(etapa => {
    if(etapa === "Perdido") return SHOW_LOST;
    return true;
  });

  etapasNoBoard.forEach(etapa=>{
    const col = document.createElement("section");
    col.className = "col";
    col.dataset.etapa = etapa;

    const sorter = (etapa === "Stand by") ? sortStandbyGrouped : sortByPriorityAndOrder;

    const inCol = leads
      .filter(l => normalizeEtapa(l.etapa || "Novo") === etapa)
      .sort(sorter);

    col.innerHTML = `
      <div class="colHead">
        <div class="name">${escapeHtml(etapa).toUpperCase()}</div>
        <div class="count">${inCol.length}</div>
      </div>
      <div class="dropzone" data-drop="${escapeHtml(etapa)}">
        ${inCol.map(cardHTML).join("")}
      </div>
    `;

    elBoard.appendChild(col);
  });

  wireDnD();
}

function toCSV(rows){
  const headers = [
    "id","ordem","data_inicio","proximo_contato",
    "nome","telefone","empreendimento","etapa","prioridade",
    "origem","responsavel","motivo_perda","observacao",
    "criado_em","atualizado_em"
  ];

  const esc = (v)=> {
    const s = String(v ?? "");
    if(/[",\n;]/.test(s)) return `"${s.replace(/"/g,'""')}"`;
    return s;
  };

  const lines = [headers.join(",")];
  rows.forEach(r=> lines.push(headers.map(h=>esc(r[h])).join(",")));
  return lines.join("\n");
}

function download(filename, text){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([text], {type:"text/csv;charset=utf-8"}));
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

async function importCSV(text){
  const isMeta = text.includes("full_name") && text.includes("created_time");

  if(isMeta){
    const rows = text.split("\n").map(r => r.split("\t")).filter(r => r.length > 1);
    if(rows.length < 2){
      alert("CSV do Meta vazio.");
      return;
    }

    const headers = rows[0].map(h => h.trim());
    const idx = (name) => headers.indexOf(name);

    const objs = rows.slice(1).map(r => {
      const rawPhone = r[idx("phone_number")] || "";
      const cleanPhone = rawPhone.replace(/\D/g,"");

      const rawDate = r[idx("created_time")] || "";
      const dataISO = rawDate ? rawDate.substring(0,10) : todayISO();

      return {
        id: crypto.randomUUID(),
        ordem: orderForTop("Novo", null),
        data_inicio: dataISO,
        proximo_contato: null,
        nome: (r[idx("full_name")] || "").replace(/^"+|"+$/g, "").trim(),
        telefone: (cleanPhone.length >= 12 && cleanPhone.startsWith("55")) ? cleanPhone.slice(2) : (cleanPhone.length >= 10 ? cleanPhone : ""),
        empreendimento: "Evolutti",
        etapa: "Novo",
        prioridade: "Alta",
        origem: "Meta",
        responsavel: "Sanchai",
        motivo_perda: "",
        observacao: "",
        criado_em: nowISO(),
        atualizado_em: nowISO()
      };
    });

    for(const o of objs){
      await upsertLead(o, {silent:true});
    }

    showToast("Leads do Meta importados.");
    await load();
    return;
  }

  alert("Formato de CSV não reconhecido.");
}

function adjustMainHeight(){
  if(!mainWrap || !headerEl) return;

  const isMobile = window.matchMedia("(max-width:820px)").matches;
  if(isMobile){
    mainWrap.style.height = "auto";
    return;
  }

  const h = headerEl.offsetHeight || 132;
  mainWrap.style.height = `calc(100vh - ${h}px)`;
}

fillSelect(fEmp, LISTS.empreendimento, "Empreendimento");
fillSelect(fOrig, LISTS.origem, "Origem");
fillSelect(fResp, LISTS.responsavel, "Responsável");
fillSelect(fPri, LISTS.prioridade, "Prioridade");

function syncClearButton(){
  if(!clearQ) return;
  if((q.value || "").trim().length) clearQ.classList.add("show");
  else clearQ.classList.remove("show");
}

q.addEventListener("input", ()=>{
  syncClearButton();
  render();
});

clearQ.addEventListener("click", ()=>{
  q.value = "";
  syncClearButton();
  q.focus();
  render();
});

syncClearButton();

});

toggleLostBtn.addEventListener("click", ()=>{

lostBox.addEventListener("click", ()=>{

});

});

fileInput.addEventListener("change", async ()=>{
  const f = fileInput.files?.[0];

  await importCSV(text);
});

function updateBadgesOnly(){
  document.querySelectorAll(".card").forEach(card=>{
    const id = card.dataset.id;
    const lead = ALL.find(x => x.id === id);
    if(!lead) return;

    const etapaNorm = normalizeEtapa(lead.etapa);
    if(etapaNorm === "Perdido" || etapaNorm === "Stand by") return;

    const b = badgeInfo(lead);
    const dtEl = card.querySelector(".dt");

    if(dtEl){
      dtEl.className = `dt ${b.cls}`;
      dtEl.textContent = b.text;
    }

    const ncEl = card.querySelector(".nc");
    const ncInfo = nextContactInfo(lead);
    if(ncEl && ncInfo){
      ncEl.className = `nc ${ncInfo.cls}`;
      ncEl.textContent = ncInfo.text;
    }
  });
}

setInterval(updateBadgesOnly, 60 * 1000);

adjustMainHeight();
window.addEventListener("resize", adjustMainHeight);
load();
